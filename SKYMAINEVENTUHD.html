<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="https://play-lh.googleusercontent.com/bp4jknyVZ8yDKhER9thIS1p9MBeU2LABqBX-sO8uaL1h5_keqlgMUmXv-CjfRWaqKw=w240-h480-rw" type="image/gif" sizes="16x16">  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TECHY KULDEEP SKY</title> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .shaka-video-container {
      position: exactfit;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    video {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
    }
    .shaka-spinner-container,
    .shaka-spinner,
    .shaka-spinner-svg {
      display: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
  </style>
</head>
<body>
  <div class="shaka-video-container" data-shaka-player>
    <video autoplay playsinline preload="metadata" poster=""></video>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        console.error('Browser not supported');
        return;
      }

      const video = document.querySelector('video');
      const player = new shaka.Player();
      await player.attach(video);

      const container = document.querySelector('.shaka-video-container');
      const ui = new shaka.ui.Overlay(player, container, video);

      ui.configure({
        controlPanelElements: [
          'play_pause', 'time_and_duration', 'mute', 'volume',
          'spacer', 'language', 'captions', 'picture_in_picture',
          'quality', 'fullscreen'
        ],
        volumeBarColors: {
          base: 'rgba(63, 187, 1, 1)',
          level: 'rgb(255, 69, 0)'
        },
        seekBarColors: {
          base: 'rgb(41, 41, 163)',
          buffered: 'rgb(35, 99, 3)',
          played: 'rgba(63, 187, 1, 1)'
        }
      });

      const drmConfig = {
        clearKeys: {
          "111c25e7e37846b06c9b87f62658546e":"d30ab65c372dac38af450625169da171","111ce0170cba6d5b3692f5b0d433e582":"74869e833e9d984df1a0d4954559187a"

        }
      };

      const streamUrl = "https://g006-lin-gb-cmaf-prd-cf.pcdn05.cssott02.com/v~1-0-0_e~1776787085_f~0_g~1_s~90bce4d8-66fe-48a1-a353-aa81ad90214a_u~b92c491bdafe3956a71f24f2e5b280fec908ddd5b2b6feed4c392605b2a78ce6_k~A_l~67_x~693a97abcd05fb8d3a6800aab2b51e52/nowgblin1/Content/CMAF_CTR_D1/Live/channel(skysportsmaineventuhd)/master.mpd";

      player.configure({
        drm: drmConfig,
        streaming: {
          lowLatencyMode: true,
          bufferingGoal: 10,
          rebufferingGoal: 5,
          bufferBehind: 10,
          retryParameters: {
            timeout: 8000,
            maxAttempts: 5,
            baseDelay: 300,
            backoffFactor: 1.2
          },
          segmentRequestTimeout: 7000,
          segmentPrefetchLimit: 3,
          useNativeHlsOnSafari: true
        },
        manifest: {
          retryParameters: {
            timeout: 8000,
            maxAttempts: 3
          }
        }
      });

      player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.skysports.com/';
        request.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/127.0.0.0 Mobile Safari/537.36';
      });

      const attemptAutoplay = async () => {
        try {
          video.muted = false;
          await video.play();
          console.log('Unmuted autoplay successful');
          return true;
        } catch (e1) {
          console.warn('Unmuted autoplay failed:', e1.message);
          try {
            video.muted = false;
            await video.play();
            console.log('Muted autoplay successful');
            return true;
          } catch (e2) {
            console.warn('Muted autoplay failed:', e2.message);
            return false;
          }
        }
      };

      try {
        await player.load(streamUrl);
        console.log("DASH stream loaded!");
        if (video.readyState >= 3) {
          await attemptAutoplay();
        } else {
          video.addEventListener('canplay', attemptAutoplay, { once: true });
          setTimeout(async () => {
            if (video.paused) await attemptAutoplay();
          }, 2000);
        }
      } catch (error) {
        console.error('Stream load error:', error);
      }

      video.addEventListener('play', () => {
        if (window.self === window.top && !document.fullscreenElement && window.innerWidth <= 768) {
          container.requestFullscreen().catch(() => console.warn('Fullscreen failed'));
        }
      }, { once: true });

      video.addEventListener('loadedmetadata', () => {
        video.volume = 1;
      });

      let interacted = false;
      const enableSound = () => {
        if (!interacted && video.muted) {
          video.muted = false;
          interacted = true;
          console.log('Sound enabled after user interaction');
        }
      };
      ['click', 'touchstart', 'keydown'].forEach(evt =>
        document.addEventListener(evt, enableSound, { once: true })
      );

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && video.paused) attemptAutoplay();
      });
    });
  </script>
</body>
</html>
